name: Bug Report
description: Report a bug for Bookmark Keep (Chrome or Firefox)
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which extension/browser is affected?
      options:
        - Chrome
        - Firefox
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: Extension version
      placeholder: e.g. 1.1.0
    validations:
      required: true

  - type: input
    id: browser_version
    attributes:
      label: Browser version
      placeholder: e.g. Chrome 134 / Firefox 137
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.3, Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps to reproduce.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: media
    attributes:
      label: Screenshots / recordings / logs
      description: Paste images, short recordings, or relevant console output.
    validations:
      required: false

